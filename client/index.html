<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/assets/photo_2026-01-02_16-03-59-removebg-preview.png">

  <title>Bezaw Partner Registration</title>

  <!-- Error Handler for debugging startup issues -->
  <script>
    window.addEventListener('error', function (e) {
      document.body.innerHTML += '<div style="color:red; background:white; padding:20px; position:absolute; top:0; left:0; z-index:9999;">JS Error: ' + e.message + ' at ' + e.filename + ':' + e.lineno + '</div>';
      console.error("Global Error:", e);
    });
    window.addEventListener('unhandledrejection', function (e) {
      document.body.innerHTML += '<div style="color:red; background:white; padding:20px; position:absolute; top:0; left:0; z-index:9999;">Promse Rejection: ' + e.reason + '</div>';
      console.error("Unhandled Rejection:", e);
    });
  </script>

  <script>
    // Immediately verify theme prevention of FOUC
    try {
      if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    } catch (e) { console.error(e); }
  </script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          animation: {
            'fadeIn': 'fadeIn 0.5s ease-out forwards',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <style>
    html {
      font-size: 13px;
    }

    body {
      font-family: 'Inter', sans-serif;
      transition: background-color 0.3s ease;
      overflow-x: hidden;
    }

    .glass {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(226, 232, 240, 1);
    }

    .dark .glass {
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(30, 41, 59, 1);
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #e2e8f0;
      border-radius: 10px;
    }

    .dark .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #334155;
    }
  </style>
</head>

<body class="bg-slate-50 dark:bg-slate-950">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
